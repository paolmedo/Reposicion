server:
  port: 8080

spring:
  application:
    name: Sucursal
  datasource:
    url: jdbc:mysql://127.0.0.1:3307/sucursal_bd
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html