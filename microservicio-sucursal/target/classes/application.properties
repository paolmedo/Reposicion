# Nombre identificatorio del microservicio
spring.application.name=Sucursal

# Conexion a MySQL-XAMPP local
spring.datasource.url=jdbc:mysql://127.0.0.1:3307/sucursal_bd
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

# Direccion del puerto
server.port= 8080
# url Swagger http://localhost:8080/doc/swagger-ui/index.html