# Nombre identificatorio del microservicio
spring.application.name=Identidad

# conexion a MySQL-XAMPP local (cambiar puerto a 3307)
spring.datasource.url=jdbc:mysql://127.0.0.1:3307/identidad_bd
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

# direccion del puerto
server.port=8082
# url Swagger http://localhost:8082/doc/swagger-ui/index.html