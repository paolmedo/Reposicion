# Nombre identificatorio del microservicio
spring.application.name=Inventario

# conexion a MySQL-XAMPP local
spring.datasource.url=jdbc:mysql://127.0.0.1:3307/inventario_bd
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

# direccion del puerto
server.port=8083
# url Swagger http://localhost:8083/doc/swagger-ui/index.html